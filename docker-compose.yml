services:
  db:
    image: postgres:16-alpine
    container_name: kite360_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: kite360
      POSTGRES_USER: kite360
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: kite360_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - internal

  api:
    image: node:20-alpine
    container_name: kite360_api
    restart: unless-stopped
    working_dir: /app
    env_file: .env
    environment:
      DATABASE_URL: postgresql://kite360:${DB_PASSWORD:-changeme}@db:5432/kite360
      REDIS_URL: redis://redis:6379
      API_PORT: 10212
      NODE_ENV: production
    command: sh -c "npm install -g pnpm && pnpm install && cd apps/api && pnpm run prisma:generate && npx tsc && node dist/main"
    volumes:
      - .:/app
      - uploads_data:/app/uploads
    ports:
      - '10212:10212'
    depends_on:
      - db
      - redis
    networks:
      - internal

  web:
    image: node:20-alpine
    container_name: kite360_web
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install -g pnpm serve && pnpm install && pnpm --filter @kite360/web build && serve -s /app/apps/web/dist -l 10212"
    volumes:
      - .:/app
    networks:
      - internal

volumes:
  postgres_data:
  redis_data:
  uploads_data:

networks:
  internal:
    driver: bridge