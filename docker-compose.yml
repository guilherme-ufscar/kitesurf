services:
  db:
    image: postgres:16-alpine
    container_name: kite360_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: kite360
      POSTGRES_USER: kite360
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: kite360_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - internal

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api-runner
    container_name: kite360_api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://kite360:${DB_PASSWORD:-changeme}@db:5432/kite360
      REDIS_URL: redis://redis:6379
      API_PORT: 10209
      NODE_ENV: production
    ports:
      - '10209:10209'
    depends_on:
      - db
      - redis
    volumes:
      - uploads_data:/app/uploads
    networks:
      - internal

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web-runner
    container_name: kite360_web
    restart: unless-stopped
    ports:
      - '10209:10209'
    networks:
      - internal

volumes:
  postgres_data:
  redis_data:
  uploads_data:

networks:
  internal:
    driver: bridge