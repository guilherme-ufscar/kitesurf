<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="KITE360º — O marketplace de kitesurf, wingfoil, kitefoil e kitewave" />
    <title>KITE360º</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet" />
    <!-- Google Translate Hidden - Camouflaged translation -->
    <meta name="google-translate-customization" content="no" />
  </head>
  <body>
    <div id="google_translate_element" style="display:none;"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Google Translate element styling (hidden)
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
          pageLanguage: 'pt',
          includedLanguages: 'pt,en,es',
          layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
          autoDisplay: false
        }, 'google_translate_element');
      }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <style>
      /* Hide Google Translate elements */
      .goog-te-banner-frame,
      .goog-te-balloon-frame,
      #goog-gt-tt,
      .goog-te-ftab,
      .goog-te-combo,
      .goog-te-gadget,
      .goog-te-menu-value,
      .goog-te-menu2,
      .goog-te-header-drag,
      .goog-transparency-info {
        display: none !important;
      }
      body { top: 0 !important; }
      .skiptranslate { display: none !important; }
      .goog-te-spinner-pos { display: none !important; }

      /* Hide any Google Translate related UI */
      .goog-tooltip,
      .goog-tooltip:hover,
      #goog-tt,
      .goog-te-arrow-frame {
        display: none !important;
      }
    </style>
  </body>
</html>
